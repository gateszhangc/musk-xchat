apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: musk-xchat
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gateszhangc/musk-xchat.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: musk-xchat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
