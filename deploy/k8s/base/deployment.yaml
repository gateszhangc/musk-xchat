apiVersion: apps/v1
kind: Deployment
metadata:
  name: musk-xchat-web
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: musk-xchat-web
  template:
    metadata:
      labels:
        app: musk-xchat-web
    spec:
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: web
          image: ghcr.io/example/musk-xchat:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: musk-xchat-web
          ports:
            - containerPort: 3000
              name: http
          startupProbe:
            httpGet:
              path: /robots.txt
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /robots.txt
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /robots.txt
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
