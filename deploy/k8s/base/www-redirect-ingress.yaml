apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: musk-xchat-live-www-redirect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://musk-xchat.lol$request_uri
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.musk-xchat.lol
      secretName: musk-xchat-lol-tls
  rules:
    - host: www.musk-xchat.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: musk-xchat-web
                port:
                  name: http
