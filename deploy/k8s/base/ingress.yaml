apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: musk-xchat-live
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - musk-xchat.lol
        - www.musk-xchat.lol
      secretName: musk-xchat-lol-tls
  rules:
    - host: musk-xchat.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: musk-xchat-web
                port:
                  name: http
